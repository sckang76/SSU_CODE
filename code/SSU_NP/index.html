<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방업계 용어 사전</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="container">
        <header style="position: relative;">
            <h1>소방업계 용어 사전</h1>
            <p>신속하고 정확한 소방 용어 검색</p>
            <!-- 다크모드 스위치: 헤더 우상단 배치 -->
            <div class="theme-switch-container">
                <label class="theme-switch" title="다크/라이트 모드 전환">
                    <input type="checkbox" id="theme-toggle" checked>
                    <span class="slider">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </span>
                </label>
            </div>
        </header>

        <section class="search-section" style="position: relative;">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="검색할 용어를 입력하세요..." autofocus autocomplete="off">
                <button type="button" id="searchBtn">검색</button>
            </div>
            
            <!-- 검색 결과 영역 (자동완성 드롭다운) -->
            <div class="search-results-area autocomplete-dropdown" style="display: none;">
                <div class="dropdown-header">
                    <span id="searchResultCount" class="result-count"></span>
                </div>
                <ul id="searchResultsList" class="term-list dropdown-list">
                    <!-- 검색 결과가 여기에 동적으로 추가됩니다 -->
                </ul>
            </div>
        </section>

        <main class="content-section">
            <!-- 전체 용어 목록 영역 (스크롤) -->
            <div class="all-terms-area">
                <div class="section-header">
                    <h2>전체 용어 <span id="totalResultCount" class="result-count">(로딩 중...)</span></h2>
                </div>
                <p class="section-desc">모든 용어를 가나다순으로 찾아볼 수 있습니다.</p>
                
                <!-- 퀵 네비게이션 바로가기 -->
                <div class="quick-nav" id="quickNav"></div>
                
                <div id="scrollableList" class="scrollable-list">
                    <div style="padding: 2rem; text-align: center; color: #666;">
                        데이터를 불러오는 중입니다...
                    </div>
                </div>
            </div>
        </main>

        <footer style="text-align: center; padding: 2rem 0; color: #94a3b8; font-size: 0.8rem; letter-spacing: 0.5px;">
            <p>&copy; dv sck..</p>
            <p style="font-size:0.72rem; color:#94a3b8; margin-top:4px; opacity:0.8;">본 사이트는 소방방재학과 교육용 참고 사이트로 법적인 효력은 없음을 고지합니다.</p>
        </footer>
    </div>

    <!-- 상세 정보 모달 -->
    <div id="termModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <h2 id="modalTermTitle">용어 제목</h2>
                <span class="badge">소방용어</span>
            </div>
            <div class="modal-body">
                <p id="modalTermDesc">용어 설명이 여기에 표시됩니다.</p>
            </div>
        </div>
    </div>

    <!-- Floating Buttons -->
    <div class="floating-btn-group">
        <a href="https://fmdic-26b04.web.app/" class="floating-btn btn-fsd" target="_blank" title="Fire-kit (메인)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span class="floating-text">Fire-kit (메인)</span>
        </a>
        <a href="https://fmdic-26b04.web.app/fss/" class="floating-btn btn-fss" target="_blank" title="소방시설 자가진단">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            <span class="floating-text">자가진단</span>
        </a>
        <a href="https://fmdic-26b04.web.app/fss3/" class="floating-btn btn-fss3" target="_blank" title="점검표(예상)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span class="floating-text">점검표(예상)</span>
        </a>
        <a href="https://fmdic-26b04.web.app/SSU_NP1/" class="floating-btn btn-np1" target="_blank" title="통합 계통도">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span class="floating-text">계통도</span>
        </a>
    </div>

    <!-- 자바스크립트 파일 연결 -->
    <script src="script.js"></script>
</body>
</html>
