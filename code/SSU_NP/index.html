<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방업계 용어 사전</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>소방업계 용어 사전</h1>
            <p>신속하고 정확한 소방 용어 검색</p>
        </header>

        <section class="search-section" style="position: relative;">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="검색할 용어를 입력하세요..." autofocus autocomplete="off">
                <button type="button" id="searchBtn">검색</button>
            </div>
            
            <!-- 검색 결과 영역 (자동완성 드롭다운) -->
            <div class="search-results-area autocomplete-dropdown" style="display: none;">
                <div class="dropdown-header">
                    <span id="searchResultCount" class="result-count"></span>
                </div>
                <ul id="searchResultsList" class="term-list dropdown-list">
                    <!-- 검색 결과가 여기에 동적으로 추가됩니다 -->
                </ul>
            </div>
        </section>

        <main class="content-section">
            <!-- 전체 용어 목록 영역 (스크롤) -->
            <div class="all-terms-area">
                <div class="section-header">
                    <h2>전체 용어 <span id="totalResultCount" class="result-count">(로딩 중...)</span></h2>
                </div>
                <p class="section-desc">모든 용어를 가나다순으로 찾아볼 수 있습니다.</p>
                
                <!-- 퀵 네비게이션 바로가기 -->
                <div class="quick-nav" id="quickNav"></div>
                
                <div id="scrollableList" class="scrollable-list">
                    <div style="padding: 2rem; text-align: center; color: #666;">
                        데이터를 불러오는 중입니다...
                    </div>
                </div>
            </div>
        </main>

        <footer style="text-align: center; padding: 2rem 0; color: #a0a0a0; font-size: 0.8rem; letter-spacing: 0.5px;">
            <p>&copy; dv sck..</p>
        </footer>
    </div>

    <!-- 상세 정보 모달 -->
    <div id="termModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <h2 id="modalTermTitle">용어 제목</h2>
                <span class="badge">소방용어</span>
            </div>
            <div class="modal-body">
                <p id="modalTermDesc">용어 설명이 여기에 표시됩니다.</p>
            </div>
        </div>
    </div>

    <!-- 자바스크립트 파일 연결 -->
    <script src="script.js"></script>
</body>
</html>
