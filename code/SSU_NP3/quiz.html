<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 | Fire-kit Pass</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body>

<!-- ── Gatekeeper: Access Control ── -->
<div id="gatekeeper-overlay" class="gatekeeper-overlay">
    <div class="gatekeeper-content">
        <div class="gate-icon"><i data-lucide="lock"></i></div>
        <h2 class="gate-title">소방자격증 한번에 합격!!</h2>
        <p class="gate-desc">이 사이트는 승인된 인원만 이용 가능합니다.<br>비밀번호를 입력해 주세요.</p>
        <div class="gate-input-group">
            <div style="position:relative; width:100%;">
                <input type="password" id="access-code" placeholder="비밀번호" onkeyup="if(event.key==='Enter') verifyAccess()">
                <div class="pw-toggle-icon" 
                     onmousedown="showPassword()" onmouseup="hidePassword()" onmouseleave="hidePassword()"
                     ontouchstart="showPassword()" ontouchend="hidePassword()">
                    <i data-lucide="eye" id="eye-icon" style="width:20px;height:20px;"></i>
                </div>
            </div>
            <button onclick="verifyAccess()" class="gate-btn">입장하기</button>
        </div>
        <p id="gate-error" class="gate-error">올바른 코드가 아닙니다. 다시 시도해 주세요.</p>
    </div>
</div>

<div id="main-app-content" class="blurred">

    <!-- ─── Header ─────────────────────────────────────── -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i data-lucide="flame"></i></div>
                FIRE-KIT PASS
            </a>
            <div style="text-align:right; display:flex; align-items:center; gap:12px;">
                <div>
                    <div id="category-title" style="font-size:0.88rem; font-weight:800; color:var(--fire); line-height:1.2;">자격증 퀴즈</div>
                    <div style="font-size:0.72rem; color:var(--text-muted); font-weight:600; margin-top:2px;">합격 집중 모드</div>
                </div>
                <button class="header-logout-btn" onclick="handleLogout()">LOG OUT</button>
                <button id="theme-toggle-btn" style="background:none; border:none; color:var(--text-main); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:4px;">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ─── Quiz Container ─────────────────────────────── -->
    <div class="quiz-container">

        <!-- Overall Mastery Dashboard -->
        <div id="mastery-dashboard" class="mastery-box" style="display:none;">
            <div class="mastery-info">
                <div class="mastery-label">
                    <i data-lucide="award"></i> 전체 학습 마스터리
                </div>
                <div class="mastery-stats">
                    <span id="mastery-count">0 / 500</span>
                    <span id="mastery-percent" class="mastery-badge">0%</span>
                </div>
            </div>
            <div class="mastery-track">
                <div id="mastery-bar" class="mastery-fill"></div>
            </div>
        </div>

        <!-- Progress Steps (10 segments) -->
        <div class="quiz-header">
            <div id="progress-steps" class="progress-steps">
                <!-- 10 steps will be injected here via JS -->
            </div>
            <p id="progress-text">Question 1 / 10</p>
        </div>

        <!-- Question Box (injected by JS) -->
        <div id="quiz-box"></div>

        <!-- ─── Result Screen ─────────────────────────── -->
        <div class="result-screen" id="result-screen">
            <div class="score-card">
                <div class="score-circle" id="final-score">0%</div>
                <h2 class="result-title">수고하셨습니다! 🔥</h2>
                <p class="result-msg">오답 분석을 확인하고 약점을 보완하세요.</p>
            </div>

            <div id="wrong-answer-list" style="max-width:680px; margin:0 auto;"></div>

            <div style="display:flex; gap:14px; justify-content:center; margin-top:36px; padding-bottom:60px; flex-wrap:wrap;">
                <button class="btn-start" onclick="loadQuiz()" style="min-width:170px;">
                    <i data-lucide="refresh-cw"></i> 다시 도전하기
                </button>
                <button class="btn-start btn-secondary" onclick="location.href='index.html'" style="min-width:170px;">
                    <i data-lucide="home"></i> 메인으로
                </button>
            </div>
        </div>

    </div>

</div> <!-- End main-app-content -->

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="quiz.js?v=4.1"></script>
    <script>
        function showPassword() {
            const input = document.getElementById('access-code');
            const icon = document.getElementById('eye-icon');
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye');
            lucide.createIcons();
        }

        function hidePassword() {
            const input = document.getElementById('access-code');
            const icon = document.getElementById('eye-icon');
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
            lucide.createIcons();
        }

        function handleLogout() {
            sessionStorage.removeItem('firekit_unlocked');
            location.reload();
        }

        lucide.createIcons();

        // ── 액세스 검증 로직 ──
        const _0x4f2a = "c3N1MTE5"; // ssu119 암호화값

        function verifyAccess() {
            const input = document.getElementById('access-code');
            const error = document.getElementById('gate-error');
            const overlay = document.getElementById('gatekeeper-overlay');
            const app = document.getElementById('main-app-content');

            if (btoa(input.value) === _0x4f2a) {
                sessionStorage.setItem('firekit_unlocked', 'true');
                overlay.classList.add('unlocked');
                app.classList.remove('blurred');
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            } else {
                error.style.display = 'block';
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                input.value = "";
            }
        }

        // 로드 시 체크
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('firekit_unlocked') === 'true') {
                document.getElementById('gatekeeper-overlay').style.display = 'none';
                document.getElementById('main-app-content').classList.remove('blurred');
            }
        });
    </script>
    <script>
        lucide.createIcons();
        
        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
