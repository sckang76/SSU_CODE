<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 마스터 | Fire-kit Pass</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .quiz-header { margin-bottom: 30px; text-align: center; }
        .progress-wrap { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { height: 100%; background: var(--accent); transition: width 0.3s ease; width: 0%; }
        
        .question-card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: none; }
        .question-card.active { display: block; animation: slideIn 0.4s ease; }
        
        .q-number { font-size: 0.9rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .q-text { font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 30px; line-height: 1.5; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 18px 24px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; text-align: left; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
        .option-btn:hover { border-color: var(--accent); background: #eff6ff; color: var(--primary); }
        .option-btn.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
        .option-btn.correct { border-color: #10b981; background: #f0fdf4; color: #059669; }
        .option-btn.wrong { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }

        .explanation-box { margin-top: 30px; padding: 24px; background: #f0f9ff; border-radius: 12px; border-left: 4px solid var(--accent); display: none; }
        .explanation-box.show { display: block; animation: fadeIn 0.5s ease; }
        .exp-title { font-weight: 800; font-size: 1rem; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .exp-text { font-size: 0.95rem; color: #334155; line-height: 1.6; }

        .nav-btns { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn-nav { padding: 12px 28px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; }
        .btn-next { background: var(--primary); color: #fff; }
        .btn-next:disabled { background: #cbd5e1; cursor: not-allowed; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-screen { text-align: center; display: none; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; margin: 0 auto 20px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon"><i data-lucide="cpu"></i></span>
                FIRE-KIT <span style="color: var(--accent-cyan); margin-left: 5px;">PASS AI</span>
            </a>
            <div class="ai-status" style="margin-bottom: 0;">
                <span id="status-pulse" style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #10b981;"></span>
                AI ANALYSIS MODE
            </div>
        </div>
    </header>

    <div class="quiz-container">
        <div class="quiz-header">
            <div class="progress-wrap" style="background: rgba(255,255,255,0.05);"><div class="progress-bar" id="progress-bar" style="background: linear-gradient(90deg, var(--primary-neon), var(--accent-cyan)); box-shadow: 0 0 10px var(--accent-cyan);"></div></div>
            <p id="progress-text" style="font-size: 0.75rem; color: var(--text-dim); font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">SCANNING DATA... 1/10</p>
        </div>

        <div id="quiz-box">
            <!-- Questions will be injected here -->
        </div>

        <div class="result-screen" id="result-screen">
            <div class="score-circle" id="final-score">0%</div>
            <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 10px;">수고하셨습니다!</h2>
            <p style="color: #64748b; margin-bottom: 30px;">핵심 요약 노트를 다시 한 번 확인해보세요.</p>
            <button class="btn-start" onclick="location.href='index.html'" style="max-width: 200px; margin: 0 auto;">홈으로 돌아가기</button>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="quiz.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
